<div class="container mt-5 mb-5">
  <h2 class="mb-4"><a href="#frogger-game" id="frogger-game">Frogger Game</a></h2>
  <div class="text-center mb-3">
    <button id="restartBtn" class="btn btn-primary" style="min-width:120px;">Restart</button>
  </div>
  <canvas id="froggerCanvas" width="400" height="500" style="border:1px solid #0078D4; background:#1e1e2f; display:block; margin:auto; box-shadow:0 0 24px #0078D4,0 0 0 8px #222 inset;"></canvas>
  <p class="text-center mt-3">Use the arrow keys to move the frog. Get to the top without hitting cars!</p>
  <p class="text-center">Press <strong>R</strong> to restart the game at any time.</p>
</div>
<script>

const canvas = document.getElementById('froggerCanvas');
const ctx = canvas.getContext('2d');
const grid = 50;
const rows = 10;
const cols = 8;
let frog, cars, gameOver, win, level, maxLevel;
let levelTheme;

const levelThemes = [
  {
    name: 'Setup',
    bg: '#1e1e2f',
    road: '#252540',
    safe: '#222c37',
    line: '#0078D4',
    desc: 'Setting up your dev container...',
    joke: 'Why did the dev container break up with the old environment?',
    punchline: 'Because it needed more space!'
  },
  {
    name: 'Install',
    bg: '#1e2f1e',
    road: '#2a4025',
    safe: '#234022',
    line: '#4CAF50',
    desc: 'Installing dependencies...',
    joke: 'Why do dev containers love npm install?',
    punchline: 'Because they like to keep their packages contained!'
  },
  {
    name: 'Build',
    bg: '#2f1e1e',
    road: '#402525',
    safe: '#402222',
    line: '#FF9800',
    desc: 'Building your project...',
    joke: 'Why did the build step get invited to the party?',
    punchline: 'Because it always brings everything together!'
  },
  {
    name: 'Test',
    bg: '#1e2f2f',
    road: '#254040',
    safe: '#224040',
    line: '#00BCD4',
    desc: 'Running tests...',
    joke: 'Why did the test runner sit in the dev container?',
    punchline: 'To make sure everything was isolated!'
  },
  {
    name: 'Deploy',
    bg: '#2f2f1e',
    road: '#404025',
    safe: '#404022',
    line: '#FFC107',
    desc: 'Deploying to production!',
    joke: 'Why was the dev container so calm during deployment?',
    punchline: 'Because it knew it could always roll back!'
  }
];


function getCarsForLevel(lvl) {
  // Make each level more interesting:
  // - Level 1: basic, slow, few cars
  // - Level 2: more cars, some faster
  // - Level 3: cars in both directions, more density
  // - Level 4: cars with variable speeds, some short, some long
  // - Level 5: cars that "blink" (disappear/reappear), and a zigzag row
  const carConfigs = [
    // Level 1
    [
      { y: 7, speed: 2, dir: 1, positions: [0, 4] },
      { y: 5, speed: 2, dir: -1, positions: [2, 6] }
    ],
    // Level 2
    [
      { y: 7, speed: 2.5, dir: 1, positions: [0, 4] },
      { y: 6, speed: 3, dir: -1, positions: [2, 6] },
      { y: 4, speed: 2, dir: 1, positions: [1, 5] }
    ],
    // Level 3
    [
      { y: 7, speed: 2.5, dir: 1, positions: [0, 4, 6] },
      { y: 6, speed: 3.5, dir: -1, positions: [2, 5] },
      { y: 5, speed: 2, dir: 1, positions: [1, 3, 7] },
      { y: 3, speed: 3, dir: -1, positions: [3, 7] }
    ],
    // Level 4
    [
      { y: 7, speed: 3, dir: 1, positions: [0, 2, 6] },
      { y: 6, speed: 2, dir: -1, positions: [1, 4, 7] },
      { y: 5, speed: 4, dir: 1, positions: [3] },
      { y: 4, speed: 2.5, dir: -1, positions: [2, 5] },
      { y: 2, speed: 3, dir: 1, positions: [0, 7] }
    ],
    // Level 5
    [
      { y: 7, speed: 3.5, dir: 1, positions: [0, 2, 4, 6], blink: true },
      { y: 6, speed: 2, dir: -1, positions: [1, 3, 5, 7] },
      { y: 5, speed: 4, dir: 1, positions: [3, 6] },
      { y: 4, speed: 2.5, dir: -1, positions: [2, 5], zigzag: true },
      { y: 3, speed: 3, dir: 1, positions: [1, 7] },
      { y: 2, speed: 2, dir: -1, positions: [0, 4] }
    ]
  ];
  // Clamp to max config
  const config = carConfigs[Math.min(lvl - 1, carConfigs.length - 1)].map(car => ({...car}));
  return config;
}


function resetGame(newLevel) {
  frog = { x: 3, y: 9 };
  level = typeof newLevel === 'number' ? newLevel : 1;
  maxLevel = 5;
  cars = getCarsForLevel(level);
  gameOver = false;
  win = false;
  // Set theme for this level
  levelTheme = levelThemes[(level - 1) % levelThemes.length];
  // Set background color
  canvas.style.background = levelTheme.bg;
}

resetGame(1);
// Restart button handler
document.getElementById('restartBtn').addEventListener('click', function() {
  resetGame(level);
});

function drawFrog() {
  // Draw a dev container: blue box with devcontainers logo (or icon-like)
  const x = frog.x * grid + 10;
  const y = frog.y * grid + 10;
  const size = grid - 20;
  // Draw blue box
  ctx.fillStyle = '#0078D4'; // VS Code/devcontainers blue
  ctx.fillRect(x, y, size, size);
  // Draw white border
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.strokeRect(x, y, size, size);
  // Draw a simple devcontainer icon (white brackets)
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + 6, y + size/2 - 8); ctx.lineTo(x + 6, y + size/2 + 8); // left bracket |
  ctx.moveTo(x + 6, y + size/2 - 8); ctx.lineTo(x + 14, y + size/2 - 8); // top _
  ctx.moveTo(x + 6, y + size/2 + 8); ctx.lineTo(x + 14, y + size/2 + 8); // bottom _
  ctx.moveTo(x + size - 6, y + size/2 - 8); ctx.lineTo(x + size - 6, y + size/2 + 8); // right bracket |
  ctx.moveTo(x + size - 14, y + size/2 - 8); ctx.lineTo(x + size - 6, y + size/2 - 8); // top _
  ctx.moveTo(x + size - 14, y + size/2 + 8); ctx.lineTo(x + size - 6, y + size/2 + 8); // bottom _
  ctx.stroke();
}

// Draw cars as dev tool icons (VS Code, Docker, Git, Terminal)
function drawCars() {
  const toolColors = ['#0078D4', '#2496ED', '#F05032', '#222']; // VS Code, Docker, Git, Terminal
  const toolLabels = ['</>', '🐳', 'GIT', 'TER'];
  const now = Date.now();
  cars.forEach((carRow, i) => {
    carRow.positions.forEach((pos, j) => {
      // Blinking cars: skip drawing every 500ms
      if (carRow.blink && Math.floor(now / 500) % 2 === 0) return;
      let x = pos * grid + 5;
      let y = carRow.y * grid + 15;
      const w = grid - 10;
      const h = grid - 30;
      // Zigzag: move up/down slightly
      if (carRow.zigzag) y += Math.sin((now/200) + j) * 8;
      // Pick a tool type based on row and car index
      const toolIdx = (i + j) % toolColors.length;
      ctx.fillStyle = toolColors[toolIdx];
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.fillRect(x, y, w, h);
      ctx.strokeRect(x, y, w, h);
      // Draw tool label/icon
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(toolLabels[toolIdx], x + w/2, y + h/2);
    });
  });
}

function moveCars() {
  // Reduce the movement multiplier to slow down the cars
  const speedMultiplier = 0.025; // was 0.05
  cars.forEach(carRow => {
    for (let i = 0; i < carRow.positions.length; i++) {
      carRow.positions[i] += carRow.speed * carRow.dir * speedMultiplier;
      if (carRow.dir === 1 && carRow.positions[i] > cols) carRow.positions[i] = -1;
      if (carRow.dir === -1 && carRow.positions[i] < -1) carRow.positions[i] = cols;
    }
  });
}

function checkCollision() {
  for (const carRow of cars) {
    if (frog.y === carRow.y) {
      for (const pos of carRow.positions) {
        if (Math.abs(frog.x - Math.round(pos)) < 0.7) {
          gameOver = true;
          return;
        }
      }
    }
  }
}

let advancingLevel = false;
let showPunchline = false;
function checkWin() {
  if (frog.y === 0 && !advancingLevel) {
    if (level < maxLevel) {
      advancingLevel = true;
      showPunchline = true;
      setTimeout(() => {
        showPunchline = false;
        resetGame(level + 1);
        advancingLevel = false;
      }, 1500); // Show punchline for 1.5s
    } else {
      win = true;
      gameOver = true;
    }
  }
}


function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Draw code editor background (lines)
  ctx.save();
  for (let y = 0; y < canvas.height; y += 24) {
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
  // Draw left gutter (like a code editor)
  ctx.fillStyle = '#232336';
  ctx.fillRect(0, 0, 36, canvas.height);
  // Draw line numbers
  ctx.fillStyle = '#6a9fb5';
  ctx.font = '12px monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  for (let i = 1; i <= rows; i++) {
    ctx.fillText(i, 32, (i-1)*grid + 8);
  }
  ctx.restore();
  // Draw safe zones (as terminal/code header/footer)
  ctx.fillStyle = levelTheme.safe;
  ctx.fillRect(0, 0, canvas.width, grid);
  ctx.fillRect(0, canvas.height - grid, canvas.width, grid);
  // Draw road (pipeline)
  ctx.fillStyle = levelTheme.road;
  ctx.fillRect(36, grid, canvas.width - 36, canvas.height - 2 * grid);
  // Draw a pipeline line
  ctx.strokeStyle = levelTheme.line;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(36, canvas.height/2);
  ctx.lineTo(canvas.width, canvas.height/2);
  ctx.stroke();
  // Draw level indicator and theme name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Level: ' + level + ' / ' + maxLevel + ' - ' + levelTheme.name, 48, 32);
  // Draw theme description
  ctx.font = 'italic 14px sans-serif';
  ctx.fillText(levelTheme.desc, 48, 54);
  // Draw dev container joke setup in the empty space within the game board (row 2)
  ctx.font = 'bold 15px sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center';
  // Place the joke in the center of the second row (not at the very top)
  ctx.fillText(levelTheme.joke, canvas.width / 2, grid + grid / 2);
  drawFrog();
  drawCars();
  if (gameOver || showPunchline) {
    ctx.fillStyle = win ? 'lime' : 'red';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(win ? 'You Win!' : (showPunchline ? 'Level Complete!' : 'Game Over'), canvas.width / 2, canvas.height / 2);
    // Show the punchline below the win/level complete message
    if (win || showPunchline) {
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = '#FFD700';
      ctx.fillText(levelTheme.punchline, canvas.width / 2, canvas.height / 2 + 40);
    }
  }
}

document.addEventListener('keydown', e => {
  // Only handle arrow keys if the canvas is focused or mouse is over it
  const arrowKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
  if (arrowKeys.includes(e.key)) {
    // Prevent page from scrolling
    e.preventDefault();
    if (gameOver) return;
    if (e.key === 'ArrowUp' && frog.y > 0) frog.y--;
    if (e.key === 'ArrowDown' && frog.y < rows - 1) frog.y++;
    if (e.key === 'ArrowLeft' && frog.x > 0) frog.x--;
    if (e.key === 'ArrowRight' && frog.x < cols - 1) frog.x++;
  }
  // Keyboard shortcut: R or r to restart
  if (e.key === 'r' || e.key === 'R') {
    e.preventDefault();
    resetGame();
  }
});

function gameLoop() {
  if (!gameOver) {
    moveCars();
    checkCollision();
    checkWin();
  }
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
